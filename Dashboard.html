<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Student System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #1e3c72;
            --light-navy: #2a5298;
            --bg-color: #f8f9fa;
        }

        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; padding-top: 80px; }

        /* Modern Navbar */
        .navbar { background: linear-gradient(90deg, var(--navy), var(--light-navy)) !important; }
        .nav-link { color: rgba(255,255,255,0.8) !important; transition: 0.3s; }
        .nav-link:hover { color: #fff !important; }

        /* Professional Hero */
        .hero { 
            background: linear-gradient(135deg, var(--navy), var(--light-navy));
            color: white; padding: 50px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 40px;
        }

        /* Dashboard Cards */
        .stat-card {
            border: none; border-radius: 16px; padding: 25px;
            background: white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .icon-box { font-size: 2rem; color: var(--navy); margin-bottom: 15px; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #333; }
        
        /* Table Styling */
        .table-container { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎓 Student System</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link active" href="dashboard.html">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="hero">
            <h2 class="display-6 fw-bold">Executive Dashboard</h2>
            <p>Overview of system performance and student data</p>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="icon-box"><i class="fas fa-user-graduate"></i></div>
                    <div class="stat-value" id="totalStudents">--</div>
                    <p class="text-muted mb-0">Total Students</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="icon-box"><i class="fas fa-award"></i></div>
                    <div class="stat-value" id="avgCgpa">--</div>
                    <p class="text-muted mb-0">Average CGPA</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="icon-box"><i class="fas fa-chart-pie"></i></div>
                    <div class="stat-value" id="activeStatus">Active</div>
                    <p class="text-muted mb-0">System Status</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h4 class="mb-4">Recent Registrations</h4>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Degree</th>
                        <th>CGPA</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('http://localhost:3000/getStudents');
                const students = await response.json();

                // Stats Calculation
                document.getElementById('totalStudents').innerText = students.length;
                const sumCgpa = students.reduce((acc, curr) => acc + (parseFloat(curr.cgpa) || 0), 0);
                document.getElementById('avgCgpa').innerText = students.length > 0 ? (sumCgpa / students.length).toFixed(2) : "0.00";

                // Populate Table (Last 5 students)
                const tableBody = document.getElementById('studentTableBody');
                tableBody.innerHTML = '';
                students.slice(-5).reverse().forEach(s => {
                    tableBody.innerHTML += `<tr>
                        <td>${s.name}</td>
                        <td>${s.degree}</td>
                        <td>${s.cgpa}</td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Error loading dashboard", err);
            }
        }
        loadDashboard();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
