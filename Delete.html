<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Delete Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #ffe6e6, #fff);
            padding-top: 80px;
        }

        .navbar {
            background:linear-gradient(90deg, #1e3c72, #2a5298) !important;
        }

        .card {
            max-width: 500px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        .btn-danger:hover {
            background: #bb2d3b;
        }

        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🗑 Student System</a>
    </div>
</nav>

<!-- DELETE CARD -->
<div class="container">
    <div class="card p-4 mt-5">
        <h2 class="text-center text-danger mb-4">Delete Student</h2>
        <label class="form-label">Enter Student Index (from View page)</label>
        <input type="number" id="index" class="form-control mb-3" placeholder="e.g. 0, 1, 2">
        <button class="btn btn-danger w-100" onclick="deleteStudent()">Delete Student</button>
        <a href="view.html" class="btn btn-secondary w-100 mt-2">Back to View</a>
    </div>
</div>

<script>
function deleteStudent() {

    let index = document.getElementById("index").value;

    if (index === "") {
        alert("Please enter index");
        return;
    }

    fetch('/deleteStudent/' + index, {
        method: 'DELETE'
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        window.location.href = "view.html";
    });
}
</script>

</body>
</html>
