<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #eef2f3, #dfe9f3);
            padding-top: 80px;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background: linear-gradient(90deg, #1e40af, #3b82f6) !important;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: auto;
            background: #ffffff;
            border: none;
        }
        #msg { margin-bottom: 15px; }
        .btn-primary { background: #1e40af; border: none; }
        .btn-primary:hover { background: #1e3a8a; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🎓 Student System</a>
    </div>
</nav>

<div class="container">
    <div class="card p-4 mt-5">
        <h2 class="text-center mb-4">✏️ Update Student</h2>
        
        <div id="msg"></div>

        <input type="text" id="name" class="form-control mb-2" placeholder="Name">
        <input type="text" id="aridNumber" class="form-control mb-2" placeholder="Arid Number">
        <input type="text" id="degree" class="form-control mb-2" placeholder="Degree">
        <input type="text" id="cgpa" class="form-control mb-3" placeholder="CGPA">

        <button class="btn btn-primary w-100" onclick="updateStudent()">Update Student</button>
        <a href="view.html" class="btn btn-secondary w-100 mt-2">Back</a>
    </div>
</div>

<script>
    let editIndex = null;

    window.onload = function () {
        let data = localStorage.getItem("editStudent");
        if (!data) {
            alert("No student selected!");
            window.location.href = "view.html";
            return;
        }

        data = JSON.parse(data);
        editIndex = data.index;

        document.getElementById("name").value = data.name;
        document.getElementById("aridNumber").value = data.aridNumber;
        document.getElementById("degree").value = data.degree;
        document.getElementById("cgpa").value = data.cgpa;
    };

    function updateStudent() {
        let name = document.getElementById("name").value;
        let aridNumber = document.getElementById("aridNumber").value;
        let degree = document.getElementById("degree").value;
        let cgpa = document.getElementById("cgpa").value;

        fetch("http://localhost:3000/updateStudent/" + editIndex, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, aridNumber, degree, cgpa })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.removeItem("editStudent");
                window.location.href = "view.html";
            } else {
                showMessage(data.message, "danger");
            }
        })
        .catch(err => {
            console.log("Error:", err);
            showMessage("Network/Server error", "danger");
        });
    }

    function showMessage(msg, type) {
        document.getElementById("msg").innerHTML = `
            <div class="alert alert-${type} text-center">${msg}</div>
        `;
    }
</script>

</body>
</html>
