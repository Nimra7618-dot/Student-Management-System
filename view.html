<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; padding-top: 70px; }
        .navbar { background: linear-gradient(90deg, #1e3c72, #2a5298) !important; }
        .card { border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        table thead { background: #0d6efd; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html">🎓 Student System</a></div></nav>
    <div class="container mt-4">
        <div class="card p-4">
            <h3 class="text-center mb-3">Students List</h3>
            <table class="table table-hover text-center">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Arid Number</th>
                        <th>Degree</th>
                        <th>CGPA</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
            <div class="text-center"><a href="index.html" class="btn btn-secondary">Back</a></div>
        </div>
    </div>

    <script>
        function loadStudents() {
            fetch('/getStudents')
            .then(res => res.json())
            .then(data => {
                let table = document.getElementById("studentTable");
                table.innerHTML = "";
                data.forEach((s, index) => {
                    table.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${s.name}</td>
                            <td>${s.aridNumber}</td>
                            <td>${s.degree}</td>
                            <td>${s.cgpa}</td>
                            <td>
                                <button class="btn btn-danger btn-sm" onclick="deleteStudent(${index})">Delete</button>
                                <button class="btn btn-warning btn-sm" onclick="goUpdate(${index})">Update</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function goUpdate(index) {
            fetch('/getStudents')
            .then(res => res.json())
            .then(data => {
                let student = data[index];
                localStorage.setItem("editStudent", JSON.stringify({
                    index: index,
                    name: student.name,
                    aridNumber: student.aridNumber,
                    degree: student.degree,
                    cgpa: student.cgpa
                }));
                window.location.href = "update.html";
            });
        }
// Ensure this exists in your server.js/app.js file
// This goes in view.html (Inside your <script> tag)
// In your view.html (Inside your <script> tag)
function deleteStudent(index) {
    if (!confirm("Are you sure?")) return;

    fetch('/deleteStudent/' + index, { 
        method: 'DELETE' 
    })
    .then(res => res.json()) // Now the server sends JSON, so this will work
    .then(data => {
        alert(data.message);
        loadStudents(); // Refresh the list
    })
    .catch(err => {
        console.error("Fetch Error:", err);
        alert("Server error occurred.");
    });
}
        loadStudents();
    </script>
</body>
</html>
